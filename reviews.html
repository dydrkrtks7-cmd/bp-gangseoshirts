<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <meta name="bpaas-design-system" content="editorial-apple">
    <meta name="bpaas-design-theme" content="kr-warm-grid">
    <title>후기 — 마포/합정 비즈니스 셔츠룸 가이드</title>
    <style>
        :root {
            --bg: #fafaf8;
            --surface: #ffffff;
            --surface-alt: #f5f4f0;
            --text-primary: #1c1c1e;
            --text-secondary: #636366;
            --text-tertiary: #8e8e93;
            --accent: #b8956a;
            --accent-soft: #dcc7a8;
            --accent-subtle: #f3ede6;
            --border: #e5e2dc;
            --border-light: #efede8;
            --grid-line: #eae7e1;
            --radius-sm: 6px;
            --radius-md: 10px;
            --radius-lg: 16px;
            --radius-xl: 20px;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.04);
            --shadow-md: 0 4px 16px rgba(0,0,0,0.06);
            --shadow-lg: 0 8px 32px rgba(0,0,0,0.08);
            --font-sans: 'Apple SD Gothic Neo', 'Noto Sans KR', -apple-system, sans-serif;
            --font-serif: 'Times New Roman', 'Noto Serif KR', Georgia, serif;
            --max-width: 1080px;
            --nav-height: 64px;
            --grid-gap: clamp(16px, 2vw, 24px);
            --section-gap: clamp(48px, 7vw, 88px);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font-sans);
            background-color: var(--bg);
            color: var(--text-primary);
            line-height: 1.64;
            -webkit-font-smoothing: antialiased;
            letter-spacing: -0.01em;
            background-image:
                linear-gradient(var(--grid-line) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
            background-size: 72px 72px;
            background-position: center center;
        }

        /* 네비게이션 */
        .nav {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(250,250,248,0.88);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border-light);
            height: var(--nav-height);
            display: flex;
            align-items: center;
        }
        .nav-inner {
            width: 100%;
            max-width: var(--max-width);
            margin: 0 auto;
            padding: 0 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .nav-logo {
            font-family: var(--font-serif);
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--text-primary);
            text-decoration: none;
            letter-spacing: -0.02em;
        }
        .nav-logo span {
            color: var(--accent);
        }
        .nav-links {
            display: flex;
            gap: 28px;
            list-style: none;
        }
        .nav-links a {
            text-decoration: none;
            color: var(--text-secondary);
            font-size: 0.88rem;
            font-weight: 500;
            transition: color 0.2s;
            letter-spacing: -0.01em;
        }
        .nav-links a:hover,
        .nav-links a.active {
            color: var(--text-primary);
        }
        .nav-links a.active {
            border-bottom: 2px solid var(--accent);
            padding-bottom: 4px;
        }

        /* 메인 레이아웃 */
        .main {
            max-width: var(--max-width);
            margin: 0 auto;
            padding: 0 24px;
        }

        /* 히어로 */
        .hero {
            text-align: center;
            padding: var(--section-gap) 0 clamp(32px, 5vw, 56px);
        }
        .hero-eyebrow {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--accent);
            font-weight: 600;
            margin-bottom: 12px;
        }
        .hero h1 {
            font-family: var(--font-serif);
            font-size: clamp(2rem, 5vw, 3.2rem);
            font-weight: 700;
            letter-spacing: -0.03em;
            line-height: 1.2;
            margin-bottom: 16px;
            color: var(--text-primary);
        }
        .hero h1 em {
            font-style: normal;
            color: var(--accent);
        }
        .hero p {
            font-size: 1.05rem;
            color: var(--text-secondary);
            max-width: 580px;
            margin: 0 auto;
        }

        /* 섹션 공통 */
        .section {
            padding: var(--section-gap) 0;
        }
        .section-header {
            margin-bottom: 40px;
        }
        .section-header .eyebrow {
            font-size: 0.78rem;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: var(--accent);
            font-weight: 600;
            margin-bottom: 8px;
        }
        .section-header h2 {
            font-family: var(--font-serif);
            font-size: clamp(1.5rem, 3.5vw, 2rem);
            font-weight: 700;
            letter-spacing: -0.02em;
            color: var(--text-primary);
        }
        .section-header p {
            color: var(--text-secondary);
            margin-top: 8px;
            font-size: 0.95rem;
        }

        /* 카드 그리드 */
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: var(--grid-gap);
        }
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 28px 26px;
            box-shadow: var(--shadow-sm);
            transition: box-shadow 0.25s, transform 0.2s;
            position: relative;
        }
        .card:hover {
            box-shadow: var(--shadow-md);
            transform: translateY(-2px);
        }
        .card-stars {
            color: #d4a853;
            font-size: 0.9rem;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }
        .card-badge {
            display: inline-block;
            font-size: 0.72rem;
            font-weight: 600;
            background: var(--accent-subtle);
            color: var(--accent);
            padding: 3px 10px;
            border-radius: 20px;
            letter-spacing: 0.04em;
            margin-bottom: 12px;
        }
        .card h3 {
            font-size: 1.05rem;
            font-weight: 700;
            margin-bottom: 8px;
            color: var(--text-primary);
            letter-spacing: -0.01em;
        }
        .card p {
            font-size: 0.9rem;
            color: var(--text-secondary);
            line-height: 1.6;
        }
        .card-meta {
            font-size: 0.78rem;
            color: var(--text-tertiary);
            margin-top: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .card-meta .dot {
            width: 4px;
            height: 4px;
            background: var(--text-tertiary);
            border-radius: 50%;
        }

        /* 케이스스터디 */
        .case-study {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-xl);
            padding: 40px 36px;
            margin-bottom: 28px;
            box-shadow: var(--shadow-sm);
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 32px;
            align-items: center;
        }
        .case-study .cs-tag {
            display: inline-block;
            font-size: 0.72rem;
            font-weight: 700;
            background: var(--text-primary);
            color: #fff;
            padding: 4px 12px;
            border-radius: 20px;
            letter-spacing: 0.05em;
            margin-bottom: 14px;
        }
        .case-study h3 {
            font-family: var(--font-serif);
            font-size: 1.35rem;
            font-weight: 700;
            margin-bottom: 10px;
            letter-spacing: -0.02em;
        }
        .case-study p {
            font-size: 0.92rem;
            color: var(--text-secondary);
            line-height: 1.7;
        }
        .case-study .cs-stat {
            font-size: 2.4rem;
            font-weight: 800;
            color: var(--accent);
            font-family: var(--font-serif);
            line-height: 1;
        }
        .case-study .cs-stat-label {
            font-size: 0.82rem;
            color: var(--text-tertiary);
            margin-top: 4px;
        }
        .cs-highlights {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .cs-highlight-item {
            text-align: center;
            padding: 20px;
            background: var(--accent-subtle);
            border-radius: var(--radius-md);
        }

        /* 신뢰 시그널 */
        .trust-bar {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: var(--grid-gap);
            margin-top: 32px;
        }
        .trust-item {
            text-align: center;
            padding: 24px 16px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-sm);
        }
        .trust-number {
            font-size: 2rem;
            font-weight: 800;
            color: var(--accent);
            font-family: var(--font-serif);
        }
        .trust-label {
            font-size: 0.82rem;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        /* 인용구 */
        .testimonial-featured {
            background: var(--surface);
            border-left: 4px solid var(--accent);
            border-radius: 0 var(--radius-lg) var(--radius-lg) 0;
            padding: 28px 32px;
            margin: 36px 0;
            box-shadow: var(--shadow-sm);
        }
        .testimonial-featured blockquote {
            font-family: var(--font-serif);
            font-size: 1.2rem;
            font-style: italic;
            color: var(--text-primary);
            margin: 0;
            line-height: 1.6;
            letter-spacing: -0.01em;
        }
        .testimonial-featured .attr {
            font-size: 0.85rem;
            color: var(--text-tertiary);
            margin-top: 12px;
            font-style: normal;
        }

        /* FAQ */
        .faq-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .faq-item {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: 20px 24px;
            cursor: default;
            box-shadow: var(--shadow-sm);
            transition: box-shadow 0.2s;
        }
        .faq-item:hover {
            box-shadow: var(--shadow-md);
        }
        .faq-item summary {
            font-weight: 600;
            font-size: 0.98rem;
            color: var(--text-primary);
            list-style: none;
            cursor: pointer;
            outline: none;
        }
        .faq-item summary::-webkit-details-marker { display: none; }
        .faq-item summary::after {
            content: '+';
            float: right;
            font-weight: 400;
            font-size: 1.3rem;
            color: var(--accent);
            transition: transform 0.2s;
        }
        .faq-item[open] summary::after {
            content: '−';
            transform: rotate(0deg);
        }
        .faq-item .faq-answer {
            margin-top: 10px;
            font-size: 0.88rem;
            color: var(--text-secondary);
            line-height: 1.6;
        }

        /* CTA */
        .cta-band {
            text-align: center;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-xl);
            padding: 48px 32px;
            margin: var(--section-gap) 0;
            box-shadow: var(--shadow-sm);
        }
        .cta-band h2 {
            font-family: var(--font-serif);
            font-size: 1.6rem;
            margin-bottom: 8px;
        }
        .cta-band p {
            color: var(--text-secondary);
            margin-bottom: 24px;
        }
        .btn {
            display: inline-block;
            background: var(--text-primary);
            color: #fff;
            text-decoration: none;
            padding: 12px 32px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 0.92rem;
            letter-spacing: -0.01em;
            transition: background 0.25s, transform 0.15s;
        }
        .btn:hover {
            background: #2c2c2e;
            transform: scale(1.02);
        }
        .btn-outline {
            background: transparent;
            color: var(--text-primary);
            border: 1.5px solid var(--text-primary);
            margin-left: 10px;
        }
        .btn-outline:hover {
            background: var(--text-primary);
            color: #fff;
        }

        /* 푸터 */
        .footer {
            border-top: 1px solid var(--border-light);
            text-align: center;
            padding: 28px 16px;
            color: var(--text-tertiary);
            font-size: 0.8rem;
            letter-spacing: 0.02em;
        }

        @media (max-width: 768px) {
            .case-study {
                grid-template-columns: 1fr;
                padding: 28px 22px;
            }
            .trust-bar {
                grid-template-columns: repeat(2, 1fr);
            }
            .card-grid {
                grid-template-columns: 1fr;
            }
            .nav-links {
                gap: 16px;
            }
            .nav-links a {
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>

<nav class="nav">
    <div class="nav-inner">
        <a href="#" class="nav-logo">마포<span>셔츠룸</span></a>
        <ul class="nav-links">
            <li><a href="#">홈</a></li>
            <li><a href="#">가이드</a></li>
            <li><a href="#" class="active">후기</a></li>
            <li><a href="#">FAQ</a></li>
            <li><a href="#">문의</a></li>
        </ul>
    </div>
</nav>

<main class="main">

    <!-- 히어로 -->
    <div class="hero">
        <p
</body>
</html>
