<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#dc2626"/>
      <stop offset="100%" stop-color="#b91c1c"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#b91c1c"/>
    </linearGradient>
  </defs>

  <!-- 배경 -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Geometric pattern -->
  <circle cx="222" cy="11" r="72" fill="#b91c1c" opacity="0.19"/>
    <circle cx="362" cy="3" r="87" fill="#b91c1c" opacity="0.18"/>
    <circle cx="40" cy="579" r="69" fill="#b91c1c" opacity="0.12"/>
    <circle cx="57" cy="351" r="67" fill="#b91c1c" opacity="0.12"/>
    <circle cx="1221" cy="28" r="82" fill="#b91c1c" opacity="0.19"/>
    <circle cx="647" cy="-58" r="65" fill="#b91c1c" opacity="0.08"/>
    <rect x="118" y="-95" width="79" height="89" rx="8" fill="#dc2626" opacity="0.10" transform="rotate(35, 292, 217)"/>
    <rect x="325" y="559" width="56" height="49" rx="8" fill="#dc2626" opacity="0.04" transform="rotate(43, 60, 512)"/>
    <rect x="796" y="-95" width="68" height="50" rx="8" fill="#dc2626" opacity="0.11" transform="rotate(6, 1293, 427)"/>
    <rect x="221" y="430" width="99" height="76" rx="8" fill="#dc2626" opacity="0.12" transform="rotate(21, 652, 107)"/>
    <rect x="282" y="170" width="50" height="64" rx="8" fill="#dc2626" opacity="0.09" transform="rotate(31, 64, 58)"/>
    <rect x="1062" y="461" width="56" height="87" rx="8" fill="#dc2626" opacity="0.09" transform="rotate(27, 130, -94)"/>
    <rect x="508" y="131" width="42" height="82" rx="8" fill="#dc2626" opacity="0.04" transform="rotate(3, 1250, 152)"/>
    <rect x="998" y="331" width="26" height="36" rx="8" fill="#dc2626" opacity="0.12" transform="rotate(10, 763, 485)"/>
    <polygon points="983,-95 1021,-19 945,-19" fill="#b91c1c" opacity="0.10"/>
    <polygon points="1295,-102 1391,90 1199,90" fill="#b91c1c" opacity="0.08"/>
    <polygon points="463,570 494,632 432,632" fill="#b91c1c" opacity="0.05"/>
    <polygon points="1041,58 1089,154 993,154" fill="#b91c1c" opacity="0.09"/>

  <!-- Wave at bottom -->
  <path d="M0,588 C360,609 840,567 1200,588 L1200,630 L0,630Z" fill="#b91c1c" opacity="0.3"/>

  <!-- 중앙 텍스트 카드 -->
  <rect x="80" y="195" width="1040" height="260" rx="20" fill="rgba(0,0,0,0.35)" filter="url(#blur-bg)"/>
  <filter id="blur-bg"><feGaussianBlur stdDeviation="8"/></filter>

  <text x="600" y="270" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="44" font-weight="700" fill="#ffffff" letter-spacing="2">
    마포/합정 비즈니스 셔츠룸 가이드
  </text>
  <text x="600" y="330" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="22" font-weight="400" fill="rgba(255,255,255,0.85)">
    마포 — 셔츠룸
  </text>

  <!-- Accent line -->
  <line x1="450" y1="355" x2="750" y2="355" stroke="#fbbf24" stroke-width="3" stroke-linecap="round" opacity="0.8"/>

  <!-- 하단 CTA -->
  <rect x="440" y="385" width="320" height="40" rx="20" fill="#fbbf24" opacity="0.9"/>
  <text x="600" y="411" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="16" font-weight="600" fill="#ffffff">
