<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <meta name="bpaas-design-system" content="editorial-apple">
    <meta name="bpaas-design-theme" content="kr-warm-grid">
    <title>자주 묻는 질문 | 마포/합정 비즈니스 셔츠룸 가이드</title>
    <style>
        :root {
            --bg: #faf9f6;
            --surface: #ffffff;
            --border: #e8e5df;
            --text-primary: #1a1a1a;
            --text-secondary: #6b6b6b;
            --text-tertiary: #999999;
            --accent: #c85a3f;
            --accent-soft: #fdf0ec;
            --accent-hover: #b04730;
            --success: #3a7d5a;
            --success-soft: #eef6f1;
            --radius-sm: 6px;
            --radius-md: 10px;
            --radius-lg: 16px;
            --radius-xl: 20px;
            --shadow-card: 0 1px 3px rgba(0,0,0,0.04),0 1px 2px rgba(0,0,0,0.03);
            --shadow-elevated: 0 4px 16px rgba(0,0,0,0.06),0 2px 6px rgba(0,0,0,0.04);
            --transition-fast: 0.18s ease;
            --transition-smooth: 0.28s cubic-bezier(0.4,0,0.2,1);
            --font-sans: 'Pretendard','Apple SD Gothic Neo','Noto Sans KR',sans-serif;
            --max-width: 720px;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            font-size: 16px;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            scroll-behavior: smooth;
        }

        body {
            font-family: var(--font-sans);
            background-color: var(--bg);
            color: var(--text-primary);
            line-height: 1.7;
            letter-spacing: -0.01em;
            min-height: 100vh;
        }

        /* ── Container ── */
        .page-wrapper {
            max-width: var(--max-width);
            margin: 0 auto;
            padding: 0 20px;
        }

        /* ── Header / Nav ── */
        .site-header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(250,249,246,0.88);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border-bottom: 1px solid var(--border);
            padding: 0 20px;
        }

        .header-inner {
            max-width: var(--max-width);
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 52px;
        }

        .logo-link {
            font-size: 1.05rem;
            font-weight: 700;
            color: var(--text-primary);
            text-decoration: none;
            letter-spacing: -0.02em;
            white-space: nowrap;
        }
        .logo-link span {
            color: var(--accent);
        }

        .nav-links {
            display: flex;
            gap: 6px;
            list-style: none;
            flex-wrap: wrap;
            justify-content: flex-end;
        }
        .nav-links a {
            display: inline-block;
            padding: 6px 13px;
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--text-secondary);
            text-decoration: none;
            border-radius: 20px;
            transition: all var(--transition-fast);
            white-space: nowrap;
        }
        .nav-links a:hover,
        .nav-links a.active {
            color: var(--text-primary);
            background: var(--surface);
            box-shadow: var(--shadow-card);
        }
        .nav-links a.active {
            font-weight: 600;
            color: var(--accent);
        }

        /* ── Page Header ── */
        .page-header {
            padding: 40px 0 28px;
            text-align: center;
        }
        .page-eyebrow {
            display: inline-block;
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: var(--accent);
            background: var(--accent-soft);
            padding: 4px 14px;
            border-radius: 20px;
            margin-bottom: 14px;
        }
        .page-title {
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: -0.03em;
            line-height: 1.25;
            color: var(--text-primary);
            margin-bottom: 8px;
        }
        .page-subtitle {
            font-size: 0.95rem;
            color: var(--text-secondary);
            font-weight: 400;
            max-width: 440px;
            margin: 0 auto;
            line-height: 1.55;
        }

        /* ── Section ── */
        .section {
            padding: 8px 0 32px;
        }
        .section-label {
            font-size: 0.78rem;
            font-weight: 700;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            color: var(--text-tertiary);
            margin-bottom: 10px;
            padding-left: 2px;
        }

        /* ── FAQ Accordion Cards ── */
        .faq-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .faq-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            overflow: hidden;
            transition: all var(--transition-smooth);
            box-shadow: var(--shadow-card);
        }
        .faq-card:hover {
            box-shadow: var(--shadow-elevated);
        }
        .faq-card.open {
            border-color: #d4cbc4;
            box-shadow: var(--shadow-elevated);
        }

        .faq-question {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 17px 20px;
            background: none;
            border: none;
            cursor: pointer;
            font-family: var(--font-sans);
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text-primary);
            text-align: left;
            letter-spacing: -0.01em;
            line-height: 1.45;
            transition: color var(--transition-fast);
        }
        .faq-question:hover {
            color: var(--accent);
        }
        .faq-card.open .faq-question {
            color: var(--accent);
        }

        .faq-icon {
            flex-shrink: 0;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: #f5f3f0;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all var(--transition-smooth);
            font-size: 1.1rem;
            color: var(--text-tertiary);
            line-height: 1;
        }
        .faq-card.open .faq-icon {
            background: var(--accent-soft);
            color: var(--accent);
            transform: rotate(45deg);
        }

        .faq-answer {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s cubic-bezier(0.4,0,0.2,1),padding 0.4s cubic-bezier(0.4,0,0.2,1);
        }
        .faq-card.open .faq-answer {
            max-height: 600px;
        }

        .faq-answer-inner {
            padding: 0 20px 18px;
            font-size: 0.9rem;
            color: var(--text-secondary);
            line-height: 1.7;
            letter-spacing: -0.005em;
        }
        .faq-answer-inner strong {
            color: var(--text-primary);
            font-weight: 600;
        }
        .faq-answer-inner .highlight {
            background: #fff8e1;
            padding: 1px 6px;
            border-radius: 3px;
            font-weight: 500;
        }

        /* ── Tip Box ── */
        .tip-box {
            background: var(--success-soft);
            border: 1px solid #d4e8db;
            border-radius: var(--radius-lg);
            padding: 18px 20px;
            margin-top: 10px;
            font-size: 0.875rem;
            color: #2d5e3f;
            line-height: 1.6;
            display: flex;
            gap: 10px;
            align-items: flex-start;
        }
        .tip-box .tip-icon {
            flex-shrink: 0;
            font-size: 1.2rem;
        }
        .tip-box strong {
            display: block;
            margin-bottom: 2px;
            font-weight: 700;
            color: #1f4630;
        }

        /* ── CTA Card ── */
        .cta-card {
            background: var(--surface);
            border: 2px solid var(--accent);
            border-radius: var(--radius-xl);
            padding: 28px 24px;
            text-align: center;
            box-shadow: var(--shadow-elevated);
            margin-top: 12px;
        }
        .cta-card h3 {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 6px;
            letter-spacing: -0.02em;
        }
        .cta-card p {
            font-size: 0.875rem;
            color: var(--text-secondary);
            margin-bottom: 18px;
            line-height: 1.55;
        }
        .cta-btn {
            display: inline-block;
            background: var(--accent);
            color: #fff;
            font-weight: 700;
            font-size: 0.95rem;
            padding: 13px 32px;
            border-radius: 30px;
            text-decoration: none;
            letter-spacing: -0.01em;
            transition: all var(--transition-fast);
            box-shadow: 0 3px 12px rgba(200,90,63,0.25);
        }
        .cta-btn:hover {
            background: var(--accent-hover);
            box-shadow: 0 5px 20px rgba(200,90,63,0.35);
            transform: translateY(-1px);
        }
        .cta-sub {
            display: block;
            font-size: 0.78rem;
            color: var(--text-tertiary);
            margin-top: 10px;
            letter-spacing: -0.005em;
        }

        /* ── Search hint ── */
        .search-hint {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 14px 18px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 30px;
            margin-bottom: 20px;
            box-shadow: var(--shadow-card);
        }
        .search-hint input {
            flex: 1;
            border: none;
            outline: none;
            font-family: var(--font-sans);
            font-size: 0.9rem;
            color: var(--text-primary);
            background: transparent;
        }
        .search-hint input::placeholder {
            color: var(--text-tertiary);
        }
        .search-hint .search-icon {
            font-size: 1.1rem;
            color: var(--text-tertiary);
            flex-shrink: 0;
        }

        /* ── Quick Links ── */
        .quick-links {
            display: flex;
            flex-wrap: wrap;
            gap: 7px;
            margin-bottom: 8px;
        }
        .quick-link-chip {
            display: inline-block;
            padding: 7px 15px;
            font-size: 0.825rem;
            font-weight: 500;
            color: var(--text-secondary);
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 22px;
            cursor: pointer;
            text-decoration: none;
            transition: all var(--transition-fast);
            letter-spacing: -0.005em;
        }
        .quick-link-chip:hover {
            color: var(--accent);
            border-color: var(--accent);
            background: var(--accent-soft);
        }

        /* ── Footer ── */
        .site-footer {
            text-align: center;
            padding: 36px 20px 28px;
            font-size: 0.78rem;
            color: var(--text-tertiary);
            letter-spacing: -0.005em;
            line-height: 1.6;
        }
        .site-footer strong {
            font-weight: 600;
            color: var(--text-secondary);
        }

        /* ── Responsive ── */
        @media (max-width: 480px) {
            .page-title {
                font-size: 1.5rem;
            }
            .faq-question {
                font-size: 0.875rem;
                padding: 14px 16px;
            }
            .faq-answer-inner {
                padding: 0 16px 14px;
                font-size: 0.84rem;
            }
            .cta-card {
                padding: 22px 16px;
            }
            .nav-links a {
                padding: 5px 10px;
                font-size: 0.8rem;
            }
            .header-inner {
                height: 46px;
            }
        }
    </style>
</head>
<body>

    <!-- ── Header / Nav ── -->
    <header class="site-header">
        <div class="header-inner">
            <a href="/" class="logo-link">마포<span>셔츠룸</span>가이드</a>
            <nav>
                <ul class="nav-links">
                    <li><a href="/">홈</a></li>
                    <li><a href="/guide">이용가이드</a></li>
                    <li><a href="/price">가격정보</a></li>
                    <li><a href="/faq" class="active">FAQ</a></li>
                    <li><a href="/contact">문의예약</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <!-- ── Main Content ── -->
    <main class="page-wrapper">

        <!-- Page Header -->
        <section class="page-header">
            <span class="page-eyebrow">FAQ</span>
            <h1 class="page-title">자주 묻는 질문</h1>
            <p class="page-subtitle">마포·합정 비즈니스 셔츠룸, 처음이라면 이 질문들부터 체크하세요. 진짜 궁금한 것만 모았어요.</p>
        </section>

        <!-- Search Hint -->
        <div class="search-hint">
            <span class="search-icon">🔍</span>
            <input type="text" placeholder="궁금한 키워드를 입력해보세요 (예: 복장, 주차, 비용)" oninput="filterFAQ(this.value)">
        </div>

        <!-- Quick Link Chips -->
        <div class="quick-links">
            <a href="#first-time" class="quick-link-chip">🏁 첫방문</a>
            <a href="#price" class="quick-link-chip">💵 비용·결제</a>
            <a href="#dress" class="quick-link-chip">👔 복장·준비물</a>
            <a href="#parking" class="quick-link-chip">🚗 주차·위치</a>
            <a href="#manner" class="quick-link-chip">🤝 매너·팁</a>
            <a href="#reserve" class="quick-link-chip">📞 예약·변경</a>
        </div>

        <!-- Section: 첫방문 관련 -->
        <section class="section" id="first-time">
            <span class="section-label">🏁 첫방문 관련</span>
            <div class="faq-list">

                <div class="faq-card" data-keywords="처음 처음이에요 첫방문 초보">
                    <button class="faq-question" onclick="toggleFAQ(this)" aria-expanded="false">
                        셔츠룸이 뭔가요? 완전 처음인데 너무 쑥스
</body>
</html>
