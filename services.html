<!DOCTYPE html>
<html lang="ko">
<head>
    <meta name="bpaas-design-system" content="editorial-apple">
    <meta name="bpaas-design-theme" content="kr-warm-grid">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>서비스 | 마포/합정 비즈니스 셔츠룸 가이드</title>
    <style>
        :root {
            --bg: #fafaf8;
            --surface: #ffffff;
            --text: #1a1a1a;
            --text-muted: #6b6b6b;
            --accent: #2c3e50;
            --accent-soft: #e8ecf1;
            --border: #e0e0dc;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.04);
            --shadow-md: 0 4px 16px rgba(0,0,0,0.06);
            --radius-sm: 8px;
            --radius-md: 14px;
            --radius-lg: 20px;
            --font-sans: 'Inter', 'Apple SD Gothic Neo', 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
            --max-width: 1080px;
            --spacing-xs: 6px;
            --spacing-sm: 12px;
            --spacing-md: 20px;
            --spacing-lg: 32px;
            --spacing-xl: 48px;
            --spacing-2xl: 72px;
        }

        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            scroll-behavior: smooth;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body {
            font-family: var(--font-sans);
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.6;
            letter-spacing: -0.01em;
            min-height: 100vh;
        }

        /* Navigation */
        .nav-container {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(250,250,248,0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border);
            transition: all 0.25s ease;
        }

        .nav-inner {
            max-width: var(--max-width);
            margin: 0 auto;
            padding: 14px var(--spacing-md);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: var(--spacing-md);
        }

        .nav-logo {
            font-weight: 700;
            font-size: 1.1rem;
            letter-spacing: -0.02em;
            color: var(--accent);
            text-decoration: none;
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .nav-logo-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--accent);
            flex-shrink: 0;
        }

        .nav-links {
            display: flex;
            gap: var(--spacing-xs);
            list-style: none;
            flex-wrap: wrap;
            align-items: center;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--text-muted);
            font-size: 0.9rem;
            font-weight: 500;
            padding: 8px 14px;
            border-radius: 20px;
            transition: all 0.2s ease;
            white-space: nowrap;
        }

        .nav-links a:hover,
        .nav-links a.active {
            color: var(--accent);
            background: var(--accent-soft);
        }

        .nav-links a.active {
            font-weight: 600;
        }

        /* Page Header */
        .page-header {
            max-width: var(--max-width);
            margin: 0 auto;
            padding: var(--spacing-2xl) var(--spacing-md) var(--spacing-xl);
            text-align: center;
        }

        .page-header .overline {
            display: inline-block;
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: var(--accent);
            background: var(--accent-soft);
            padding: 6px 16px;
            border-radius: 20px;
            margin-bottom: var(--spacing-md);
        }

        .page-header h1 {
            font-size: clamp(2rem, 4vw, 2.8rem);
            font-weight: 800;
            letter-spacing: -0.03em;
            line-height: 1.2;
            margin-bottom: var(--spacing-sm);
            color: var(--text);
        }

        .page-header .subtitle {
            font-size: 1.1rem;
            color: var(--text-muted);
            font-weight: 400;
            max-width: 600px;
            margin: 0 auto;
            line-height: 1.6;
        }

        /* Main Content */
        .main-content {
            max-width: var(--max-width);
            margin: 0 auto;
            padding: 0 var(--spacing-md) var(--spacing-2xl);
        }

        /* Section Titles */
        .section-title {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: var(--spacing-xs);
            color: var(--text);
        }

        .section-subtitle {
            font-size: 0.95rem;
            color: var(--text-muted);
            margin-bottom: var(--spacing-lg);
            line-height: 1.5;
        }

        /* Cards Grid */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: var(--spacing-md);
            margin-bottom: var(--spacing-2xl);
        }

        .card {
            background: var(--surface);
            border-radius: var(--radius-md);
            padding: var(--spacing-lg);
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border);
            transition: all 0.25s ease;
            display: flex;
            flex-direction: column;
            gap: var(--spacing-sm);
        }

        .card:hover {
            box-shadow: var(--shadow-md);
            transform: translateY(-2px);
        }

        .card-icon {
            width: 44px;
            height: 44px;
            border-radius: var(--radius-sm);
            background: var(--accent-soft);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            flex-shrink: 0;
        }

        .card h3 {
            font-size: 1.1rem;
            font-weight: 700;
            letter-spacing: -0.01em;
            color: var(--text);
        }

        .card p {
            font-size: 0.9rem;
            color: var(--text-muted);
            line-height: 1.6;
            flex-grow: 1;
        }

        .card .tag {
            display: inline-block;
            font-size: 0.75rem;
            font-weight: 600;
            padding: 4px 10px;
            border-radius: 12px;
            background: var(--accent-soft);
            color: var(--accent);
            align-self: flex-start;
        }

        /* Anecdote Block */
        .anecdote-block {
            background: var(--surface);
            border-radius: var(--radius-lg);
            padding: var(--spacing-xl);
            margin-bottom: var(--spacing-2xl);
            border: 1px solid var(--border);
            box-shadow: var(--shadow-sm);
            position: relative;
            overflow: hidden;
        }

        .anecdote-block::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 4px;
            background: var(--accent);
            border-radius: 0 4px 4px 0;
        }

        .anecdote-block .quote-mark {
            font-size: 3rem;
            line-height: 1;
            color: var(--accent-soft);
            font-weight: 800;
            margin-bottom: var(--spacing-sm);
        }

        .anecdote-block p {
            font-size: 1rem;
            color: var(--text);
            line-height: 1.7;
            font-style: italic;
            margin-bottom: var(--spacing-sm);
        }

        .anecdote-block .author {
            font-size: 0.85rem;
            color: var(--text-muted);
            font-weight: 600;
            font-style: normal;
        }

        /* Pricing Table */
        .pricing-table-wrapper {
            overflow-x: auto;
            margin-bottom: var(--spacing-2xl);
            -webkit-overflow-scrolling: touch;
        }

        .pricing-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            background: var(--surface);
            border-radius: var(--radius-md);
            overflow: hidden;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border);
            min-width: 640px;
        }

        .pricing-table thead th {
            background: var(--accent);
            color: #ffffff;
            font-size: 0.85rem;
            font-weight: 700;
            letter-spacing: 0.03em;
            text-transform: uppercase;
            padding: 16px 20px;
            text-align: center;
            white-space: nowrap;
        }

        .pricing-table thead th:first-child {
            text-align: left;
            border-radius: var(--radius-md) 0 0 0;
        }

        .pricing-table thead th:last-child {
            border-radius: 0 var(--radius-md) 0 0;
        }

        .pricing-table tbody td {
            padding: 14px 20px;
            text-align: center;
            font-size: 0.9rem;
            color: var(--text);
            border-bottom: 1px solid var(--border);
            white-space: nowrap;
        }

        .pricing-table tbody td:first-child {
            text-align: left;
            font-weight: 600;
            color: var(--accent);
        }

        .pricing-table tbody tr:last-child td {
            border-bottom: none;
        }

        .pricing-table tbody tr:nth-child(even) {
            background: #fcfcfb;
        }

        .pricing-table tbody tr:hover {
            background: var(--accent-soft);
            transition: background 0.2s ease;
        }

        .price-highlight {
            font-weight: 700;
            color: var(--accent);
            font-size: 1rem;
        }

        .price-note {
            display: block;
            font-size: 0.75rem;
            color: var(--text-muted);
            font-weight: 400;
            margin-top: 2px;
        }

        /* Comparison Section */
        .comparison-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: var(--spacing-md);
            margin-bottom: var(--spacing-2xl);
        }

        .comparison-card {
            background: var(--surface);
            border-radius: var(--radius-md);
            padding: var(--spacing-lg);
            border: 1px solid var(--border);
            box-shadow: var(--shadow-sm);
        }

        .comparison-card.recommended {
            border: 2px solid var(--accent);
            position: relative;
        }

        .comparison-card.recommended::after {
            content: '추천';
            position: absolute;
            top: -12px;
            right: 20px;
            background: var(--accent);
            color: #fff;
            font-size: 0.75rem;
            font-weight: 700;
            padding: 4px 14px;
            border-radius: 12px;
            letter-spacing: 0.04em;
        }

        .comparison-card h3 {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: var(--spacing-sm);
            color: var(--text);
        }

        .comparison-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .comparison-list li {
            font-size: 0.9rem;
            color: var(--text-muted);
            padding: 8px 0;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .comparison-list li:last-child {
            border-bottom: none;
        }

        .icon-check {
            color: #2e7d32;
            font-weight: 700;
            font-size: 1rem;
        }
        .icon-x {
            color: #c62828;
            font-weight: 700;
            font-size: 1rem;
        }

        /* FAQ Section */
        .faq-section {
            margin-bottom: var(--spacing-2xl);
        }

        .faq-item {
            background: var(--surface);
            border-radius: var(--radius-md);
            padding: var(--spacing-lg);
            margin-bottom: var(--spacing-sm);
            border: 1px solid var(--border);
            box-shadow: var(--shadow-sm);
            transition: all 0.2s ease;
        }

        .faq-item:hover {
            box-shadow: var(--shadow-md);
        }

        .faq-item h4 {
            font-size: 1rem;
            font-weight: 700;
            margin-bottom: 6px;
            color: var(--text);
            cursor: default;
        }

        .faq-item p {
            font-size: 0.9rem;
            color: var(--text-muted);
            line-height: 1.6;
        }

        /* Footer */
        .
</body>
</html>
